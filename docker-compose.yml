services:
  sezzle-ops:
    build: .
    image: sezzle-merchant-mcp:local
    environment:
      SEZZLE_ENV: ${SEZZLE_ENV:-sandbox}
      SEZZLE_API_BASE_URL: ${SEZZLE_API_BASE_URL:-}
      SEZZLE_MERCHANT_UUID: ${SEZZLE_MERCHANT_UUID:-}
      SEZZLE_API_KEY: ${SEZZLE_API_KEY:-}
      SEZZLE_API_SECRET: ${SEZZLE_API_SECRET:-}
      SEZZLE_WEBHOOK_SECRET: ${SEZZLE_WEBHOOK_SECRET:-}
      SEZZLE_READ_ONLY: ${SEZZLE_READ_ONLY:-true}
      SEZZLE_REQUIRE_CONFIRMATION: ${SEZZLE_REQUIRE_CONFIRMATION:-true}
      SEZZLE_PERMISSION_PROFILE: ${SEZZLE_PERMISSION_PROFILE:-read}
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_HTTP_AUTH_TOKEN: ${MCP_HTTP_AUTH_TOKEN:?Set MCP_HTTP_AUTH_TOKEN in .env}
      MCP_HTTP_ALLOWED_HOSTS: ${MCP_HTTP_ALLOWED_HOSTS:-localhost,127.0.0.1}
      MCP_HTTP_ALLOWED_ORIGINS: ${MCP_HTTP_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEZZLE_STORAGE: sqlite
      SEZZLE_SQLITE_PATH: /app/data/sezzle-ops.db
    ports:
      - '${MCP_HTTP_PORT:-3000}:3000'
    volumes:
      - sezzle-ops-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sezzle-ops-data:
